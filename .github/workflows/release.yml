name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-releases:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            arch: aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            arch: x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp target/${{ matrix.target }}/release/pact-sse-plugin${{ matrix.os == 'windows-latest' && '.exe' || '' }} release-artifacts/
          cp pact-plugin.json release-artifacts/
          
          # Create gzipped binary
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            gzip -k release-artifacts/pact-sse-plugin
          fi

      - name: Calculate checksums
        shell: bash
        run: |
          cd release-artifacts
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            sha256sum pact-sse-plugin.gz > pact-sse-plugin.gz.sha256
          fi
          sha256sum pact-plugin.json > pact-plugin.json.sha256

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/pact-sse-plugin${{ matrix.os == 'windows-latest' && '.exe' || '' }}
            release-artifacts/pact-sse-plugin.gz
            release-artifacts/pact-sse-plugin.gz.sha256
            release-artifacts/pact-plugin.json
            release-artifacts/pact-plugin.json.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-plugins:
    needs: build-releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update plugin index
        run: |
          echo "Plugin release artifacts built successfully"
          echo "Artifacts are now available in the release"
